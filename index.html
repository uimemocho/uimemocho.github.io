<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="小さなツールとゲームを集めた、個人制作のプレイグラウンド。"
    />
    <meta property="og:title" content="uimemocho — Tools & Games" />
    <meta
      property="og:description"
      content="小さなツールとゲームを集めた、個人制作のプレイグラウンド。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ja_JP" />
    <title>uimemocho — Tools &amp; Games</title>
    <link rel="canonical" href="https://uimemocho.github.io/" />
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace(`https://uimemocho.github.io/${window.location.hash}`);
      }
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/app.js?v=20260719-2018"></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="#top" aria-label="uimemocho ホーム">
          <span class="brand-mark" aria-hidden="true"></span>
          uimemocho
        </a>
        <span class="header-label">Independent digital playground</span>
        <span class="header-index">Tokyo / 2026</span>
      </header>

      <main id="top">
        <section class="hero" aria-labelledby="headline" data-reveal>
          <div class="hero-copy">
            <p class="eyebrow">Tools, games &amp; small experiments</p>
            <h1 id="headline">つくったものを、<br />いつでも遊べる場所に。</h1>
          </div>
          <div class="hero-aside">
            <span class="vertical-rule" aria-hidden="true"></span>
            <div>
              <p class="intro">
                小さなツールとゲームを集めた、個人制作のプレイグラウンド。
              </p>
              <p class="aside-meta">
                Open catalog — <span id="hero-count">00</span> projects
              </p>
            </div>
          </div>
          <span class="hero-watermark" id="hero-watermark" aria-hidden="true">00</span>
        </section>

        <section class="catalog" aria-labelledby="catalog-title">
          <div class="catalog-bar" data-reveal>
            <div>
              <p class="catalog-kicker">Collection / 2026</p>
              <h2 class="section-title" id="catalog-title">
                Project index <span id="visible-count">00</span>
              </h2>
            </div>
            <div class="filters" role="group" aria-label="作品を種類で絞り込む">
              <button class="filter" type="button" data-filter="all" aria-pressed="true">
                すべて
              </button>
              <button class="filter" type="button" data-filter="tool" aria-pressed="false">
                ツール
              </button>
              <button class="filter" type="button" data-filter="game" aria-pressed="false">
                ゲーム
              </button>
            </div>
          </div>

          <div class="project-grid" id="project-grid" aria-live="polite"></div>
          <p class="catalog-notice" id="catalog-notice" role="status" aria-live="polite">
            作品情報を読み込んでいます。
          </p>
        </section>
      </main>

      <footer>
        <span>© uimemocho</span>
        <span>Made with curiosity in Japan</span>
      </footer>
    </div>
  </body>
</html>
