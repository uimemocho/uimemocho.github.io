<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08080b">
<title>錯視ラボ / ILLUSION LAB</title>
<style>
:root{
  --bg:#08080b; --surface:#101016; --surface2:#16161e; --surface3:#1c1c26;
  --border:#252530; --border-hi:#3a3a52;
  --text:#dcdce8; --dim:#8b8ba6; --muted:#55556a;
  --accent:#00e878; --accent2:#ff2e5c; --accent3:#2e8cff; --warn:#ffa726;
  --purple:#a855f7; --cyan:#22d3ee;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Courier New",monospace;
  --jp:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--jp);}
body{padding-bottom:env(safe-area-inset-bottom)}
.scan{position:fixed;inset:0;pointer-events:none;z-index:9;opacity:.35;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.025) 0 1px,transparent 1px 3px)}
.app{max-width:700px;margin:0 auto;padding:0 max(20px,env(safe-area-inset-left)) 72px max(20px,env(safe-area-inset-right))}

/* header */
.hd{position:sticky;top:0;z-index:8;background:rgba(8,8,11,.94);backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:8px;padding:12px 10px 10px;border-bottom:1px solid var(--border)}
.brand{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);
  display:flex;align-items:center;gap:7px}
.brand i{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);font-style:normal}
.brand small{color:var(--dim);font-weight:400;letter-spacing:1px;font-size:9px}
.hd-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.pill{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--dim);
  border:1px solid var(--border);border-radius:99px;padding:4px 8px}
.pill b{color:var(--accent)}

/* nav */
.scroller{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroller::-webkit-scrollbar{display:none}
.cat{flex:0 0 auto;font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 11px;
  border:1px solid var(--border);border-radius:99px;background:var(--surface);color:var(--dim);cursor:pointer;
  transition:.15s;white-space:nowrap}
.cat.active{color:#08080b;background:var(--accent);border-color:var(--accent);font-weight:700}
.chip{flex:0 0 auto;font-size:11px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);color:var(--dim);cursor:pointer;white-space:nowrap;transition:.15s;position:relative}
.chip.active{color:var(--text);border-color:var(--accent);background:var(--surface3);
  box-shadow:0 0 0 1px rgba(0,232,120,.25) inset}
.chip.done::after{content:"";position:absolute;top:5px;right:5px;width:4px;height:4px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 5px var(--accent)}

/* stage */
.stage{margin-top:10px;border:1px solid var(--border);border-radius:8px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;padding:12px;background:#808080;transition:background .2s}
.stage.zoom{position:fixed;inset:0;z-index:20;border-radius:0;padding:14px;margin:0}
canvas{width:100%;height:auto;display:block;touch-action:manipulation;border-radius:2px}
.stage.zoom canvas{width:auto;height:auto;max-width:100%;max-height:100%}
#zoomclose{display:none;position:fixed;right:12px;top:calc(12px + env(safe-area-inset-top));z-index:21}
.stage.zoom ~ #zoomclose{display:block}

/* hook caption (viral punchline) */
.hook{margin-top:10px;border:1px solid var(--border-hi);border-left:3px solid var(--accent);
  border-radius:8px;background:linear-gradient(180deg,rgba(0,232,120,.05),rgba(0,232,120,0));padding:12px 13px}
.hook.sess{border-left-color:var(--warn);background:linear-gradient(180deg,rgba(255,167,38,.06),rgba(255,167,38,0))}
.h-row{display:flex;align-items:baseline;gap:8px;font-size:12.5px;color:var(--dim);line-height:1.5}
.h-tag{flex:0 0 auto;font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--muted);
  border:1px solid var(--border);border-radius:3px;padding:2px 6px;position:relative;top:-1px}
.h-fact{margin-top:9px;font-size:17px;font-weight:800;line-height:1.35;letter-spacing:.3px;color:var(--text)}
.h-fact b{color:var(--accent);text-shadow:0 0 14px rgba(0,232,120,.35)}
.hook.sess .h-fact b{color:var(--warn);text-shadow:0 0 14px rgba(255,167,38,.35)}
.h-why{margin-top:9px;font-size:10.5px;line-height:1.6;color:var(--muted)}
.h-why b{color:var(--dim);font-weight:600}

/* titles */
.tbar{padding:14px 2px 2px}
.tbar h2{margin:0;font-size:17px;letter-spacing:.5px}
.tbar .en{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);margin-top:3px;text-transform:uppercase}
.tbar p{margin:7px 0 0;font-size:12.5px;line-height:1.65;color:var(--dim)}

/* section */
.section{margin-top:12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:12px}
.stitle{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:9px;font-weight:700;
  letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.stitle i{width:5px;height:5px;border-radius:50%;font-style:normal;background:var(--accent);box-shadow:0 0 6px var(--accent)}
.stitle.c2 i{background:var(--accent3);box-shadow:0 0 6px var(--accent3)}
.stitle.c3 i{background:var(--purple);box-shadow:0 0 6px var(--purple)}
.stitle.c4 i{background:var(--warn);box-shadow:0 0 6px var(--warn)}

/* params */
.prow{display:flex;align-items:center;gap:9px;margin:9px 0}
.plab{flex:0 0 86px;font-size:10.5px;color:var(--dim);line-height:1.3}
.pval{flex:0 0 46px;text-align:right;font-family:var(--mono);font-size:10px;color:var(--accent)}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:22px;background:transparent;margin:0}
input[type=range]::-webkit-slider-runnable-track{height:2px;background:var(--border-hi);border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--accent);margin-top:-7px;box-shadow:0 0 8px rgba(0,232,120,.5);cursor:pointer}
input[type=range]::-moz-range-track{height:2px;background:var(--border-hi)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border:0;border-radius:50%;background:var(--accent)}
select{flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:5px;
  padding:7px 8px;font-size:11px;font-family:var(--jp)}
.hint{font-size:10px;color:var(--muted);line-height:1.5;margin:2px 0 8px 95px}

/* buttons */
.btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.btn{flex:1;min-width:88px;font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:10px 8px;
  border:1px solid var(--border-hi);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer;
  transition:.15s;min-height:38px}
.btn:active{background:var(--surface3)}
.btn.on{background:var(--accent);color:#08080b;border-color:var(--accent);font-weight:700}
.btn.acc{border-color:var(--accent);color:var(--accent)}
.btn.sm{flex:0 0 auto;min-width:0;padding:6px 9px;font-size:9px;min-height:30px}

/* task */
.result{margin-top:10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);padding:11px}
.result .big{font-family:var(--mono);font-size:24px;color:var(--accent);letter-spacing:1px}
.result .big.bad{color:var(--warn)}
.result p{margin:6px 0 0;font-size:11.5px;line-height:1.6;color:var(--dim)}
.gauge{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:9px}
.gauge b{display:block;height:100%;background:var(--accent);box-shadow:0 0 8px var(--accent)}

/* note */
.note h4{margin:12px 0 5px;font-size:11px;color:var(--text);letter-spacing:.5px;display:flex;gap:6px;align-items:center}
.note h4:first-of-type{margin-top:0}
.note h4 em{font-style:normal;font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1.5px}
.note p{margin:0;font-size:12px;line-height:1.75;color:var(--dim)}
.note .ui{border-left:2px solid var(--accent3);padding-left:10px}
.tag{display:inline-block;font-family:var(--mono);font-size:8.5px;letter-spacing:1px;color:var(--muted);
  border:1px solid var(--border);border-radius:3px;padding:2px 6px;margin:8px 4px 0 0}

/* timer */
.timer{font-family:var(--mono);font-size:11px;color:var(--warn);letter-spacing:1px;margin-top:8px;text-align:center}

footer{margin-top:22px;padding-top:14px;border-top:1px solid var(--border);
  font-size:10px;line-height:1.7;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(12px);z-index:30;
  background:var(--accent);color:#08080b;font-size:11px;font-weight:700;padding:9px 16px;border-radius:99px;
  opacity:0;pointer-events:none;transition:.25s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.plab{flex-basis:74px;font-size:10px}.hint{margin-left:83px}}
</style>
</head>
<body>
<div class="scan"></div>
<div class="app">
  <header class="hd">
    <div class="brand"><i></i>ILLUSION LAB</div>
    <div class="hd-r">
      <span class="pill"><span id="lblExp">体験</span> <b id="prog">0</b>/<span id="total">0</span></span>
      <button class="btn sm" id="lang">EN</button>
      <button class="btn sm" id="snd">SOUND</button>
    </div>
  </header>

  <nav class="scroller" id="cats"></nav>
  <nav class="scroller" id="chips"></nav>

  <div class="stage" id="stage"><canvas id="cv"></canvas></div>
  <button class="btn sm" id="zoomclose">閉じる</button>

  <div class="hook" id="hook"></div>

  <div class="tbar">
    <h2 id="ttl">—</h2>
    <div class="en" id="en"></div>
    <p id="lead"></p>
  </div>

  <section class="section" id="ctrlsec">
    <div class="stitle"><i></i><span id="ttlCtrl">操作パネル</span></div>
    <div id="ctrl"></div>
    <div class="btnrow" id="btns"></div>
    <div class="timer" id="timer" style="display:none"></div>
  </section>

  <section class="section" id="tasksec" style="display:none">
    <div class="stitle c4"><i></i><span id="ttlTask">知覚のズレを測る</span></div>
    <div id="taskbody"></div>
  </section>

  <section class="section note">
    <div class="stitle c2"><i></i><span id="ttlNote">解説</span></div>
    <h4><span id="ttlPercept">見え方</span> <em>PERCEPT</em></h4><p id="n1"></p>
    <h4><span id="ttlMech">起きていること</span> <em>MECHANISM</em></h4><p id="n2"></p>
    <h4><span id="ttlApply">UI・演出への応用</span> <em>APPLY</em></h4><p class="ui" id="n3"></p>
    <div id="tags"></div>
  </section>

  <footer id="foot">
    錯視ラボ v1.0 ／ 単一HTML・外部依存なし・全図形はCanvasで手続き生成<br>
    錯視の成因は現在も研究途上で、複数の有力仮説が並立するものがあります。定説でない箇所は「〜と考えられている」と表記しています。<br>
    ※ 光の点滅や高コントラストの反復パターンを含みます。気分が悪くなった場合はすぐ中止してください。光感受性発作の既往がある方は使用をお控えください。
  </footer>
</div>
<div class="toast" id="toast"></div>
<script>
"use strict";
/* ===== helpers ===== */
var $=function(s){return document.querySelector(s);};
var TAU=Math.PI*2, D2R=Math.PI/180, ACC='#00e878';
function gs(v){v=Math.max(0,Math.min(255,Math.round(v)));return 'rgb('+v+','+v+','+v+')';}
function ln(g,x1,y1,x2,y2,c,lw){g.strokeStyle=c;g.lineWidth=lw||2;g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);g.stroke();}
function dln(g,x1,y1,x2,y2,c,lw){g.save();g.setLineDash([6,5]);ln(g,x1,y1,x2,y2,c||ACC,lw||2);g.restore();}
function cir(g,x,y,r,fill,stroke,lw){g.beginPath();g.arc(x,y,r,0,TAU);if(fill){g.fillStyle=fill;g.fill();}if(stroke){g.strokeStyle=stroke;g.lineWidth=lw||2;g.stroke();}}
function dcir(g,x,y,r,c){g.save();g.setLineDash([5,4]);g.beginPath();g.arc(x,y,r,0,TAU);g.strokeStyle=c||ACC;g.lineWidth=2;g.stroke();g.restore();}
function rect(g,x,y,w,h,c){g.fillStyle=c;g.fillRect(x,y,w,h);}
function txt(g,s,x,y,size,c,al,bold){
  if(typeof lang!=='undefined'&&lang==='en'&&typeof CANVAS_TR!=='undefined'&&CANVAS_TR[s])s=CANVAS_TR[s];
  g.fillStyle=c;g.textAlign=al||'center';g.textBaseline='middle';
  g.font=(bold?'700 ':'')+size+'px ui-monospace,Menlo,monospace';g.fillText(s,x,y);}
function poly(g,pts,c){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);for(var i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();g.fillStyle=c;g.fill();}
function inPoly(px,py,pts){var c=false;for(var i=0,j=pts.length-1;i<pts.length;j=i++){
  var xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
  if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))c=!c;}return c;}

/* ===== illusion registry ===== */
var CATS=[['size','大きさ・長さ','Size & Length'],['tilt','傾き・形','Tilt & Shape'],['bright','明るさ・色','Brightness & Color'],['edge','輪郭・分割','Contour & Grouping'],['motion','動き・残像','Motion & Afterimage']];

var ILLUSIONS=[
/* ---------- 1 ---------- */
{id:'ebbinghaus',cat:'size',name:'エビングハウス錯視',en:'Ebbinghaus / Titchener',ratio:0.6,bg:'#e9e9ec',
 lead:'中央のオレンジの円Aと円B。どちらが大きく見えますか。「錯視の強さ」を0にすると、周囲の円が同じになり答えが見えます。',
 params:[
  {k:'st',label:'錯視の強さ',min:0,max:1,step:.01,def:1,fmt:function(v){return v.toFixed(2);},hint:'周囲の円の大小差。0で錯視が消えます'},
  {k:'gap',label:'周囲との距離',min:.15,max:1.2,step:.01,def:.55,fmt:function(v){return v.toFixed(2);},hint:'離すほど効果は弱まります'}],
 task:{k:'adj',label:'Aの大きさ',min:.6,max:1.5,step:.005,def:1,truth:1,unit:'倍',
   ask:'円Aを、円Bと「同じ大きさに見える」ところまで調整して判定してください。',
   over:'Aを実際より大きくしていました＝Aは小さく見えていた（大きな囲みに押し縮められた）。',
   under:'Aを実際より小さくしていました＝Aは大きく見えていた（囲みの効果が反転しています）。'},
 draw:function(g,w,h,P,S){
   var cy=h*.46,c=P.st;
   var bigM=.7+1.7*c,smlM=.7-.46*c;
   var r=Math.min(w*.245,h*.42)/(1.5*(1+P.gap)+4.8);
   var lx=w*.27,rx=w*.73;
   cl(g,lx,cy,r*P.adj,r*bigM,6,P.gap); cl(g,rx,cy,r,r*smlM,7,P.gap);
   if(S.reveal){dcir(g,lx,cy,r,ACC);dcir(g,rx,cy,r,ACC);
     txt(g,'点線＝同一サイズ基準',w*.5,h*.06,11,'#555');}
   txt(g,'A',lx,h*.95,13,'#33333c',null,1);txt(g,'B',rx,h*.95,13,'#33333c',null,1);
   function cl(g,cx,cy,cr,sr,n,gap){var d=cr+sr+cr*gap;
     for(var i=0;i<n;i++){var a=i/n*TAU-Math.PI/2;cir(g,cx+Math.cos(a)*d,cy+Math.sin(a)*d,sr,'#41414d');}
     cir(g,cx,cy,cr,'#ff7a2f');}},
 n1:'囲みが大きいほど中央は小さく、囲みが小さいほど中央は大きく見えます。多くの人は5〜20%程度ずれます。',
 n2:'周囲の図形との相対比較で大きさが評価されるため（大きさの対比）と考えられています。近接した文脈が絶対サイズの判断を上書きします。囲みの距離を離すと効果が弱まることも知られています。',
 n3:'アイコンやボタンの体感サイズは、周囲の余白と隣接要素で変わります。同一サイズのアイコンでも、密集グリッド内と広い余白の中では別物に見える。逆に言えば、実寸を変えずに「余白と隣接物」だけで主役感を作れます。CTAを大きく見せたいなら、まず周りを小さく・少なくする。',
 tags:['大きさの対比','余白設計','CTA']},

/* ---------- 2 ---------- */
{id:'muller',cat:'size',name:'ミュラー・リヤー錯視',en:'Müller-Lyer 1889',ratio:0.55,bg:'#e9e9ec',
 lead:'上下の水平線。矢羽の向きだけが違います。長さはどう見えますか。',
 params:[
  {k:'ang',label:'矢羽の角度',min:0,max:85,step:1,def:40,fmt:function(v){return v+'°';},hint:'0°で矢羽が線と重なり、錯視がほぼ消えます'},
  {k:'fin',label:'矢羽の長さ',min:.2,max:1.6,step:.02,def:1,fmt:function(v){return v.toFixed(2);}}],
 task:{k:'adj',label:'下の線の長さ',min:.6,max:1.5,step:.005,def:1,truth:1,unit:'倍',
   ask:'下の線（内向き矢羽）を、上の線と「同じ長さに見える」まで調整してください。',
   over:'下の線を実際より長くしていました＝内向き矢羽の線は短く見えていた。',
   under:'下の線を実際より短くしていました。'},
 draw:function(g,w,h,P,S){
   var L=w*.5,cx=w*.5,y1=h*.34,y2=h*.7,f=w*.09*P.fin,a=P.ang*D2R;
   ml(cx,y1,L,1); ml(cx,y2,L*P.adj,-1);
   if(S.reveal){dln(g,cx-L/2,h*.15,cx-L/2,h*.85);dln(g,cx+L/2,h*.15,cx+L/2,h*.85);
     txt(g,'点線＝上の線の両端',w*.5,h*.08,11,'#555');}
   function ml(cx,y,L,dir){var x1=cx-L/2,x2=cx+L/2;ln(g,x1,y,x2,y,'#20202a',3);
     var e=[[x1,-1],[x2,1]];for(var i=0;i<2;i++){var dx=e[i][1]*dir*Math.cos(a)*f,dy=Math.sin(a)*f;
       ln(g,e[i][0],y,e[i][0]+dx,y-dy,'#20202a',3);ln(g,e[i][0],y,e[i][0]+dx,y+dy,'#20202a',3);}}},
 n1:'外向き矢羽（＜—＞）の線は長く、内向き矢羽（＞—＜）の線は短く見えます。差は10〜25%程度になることがあります。',
 n2:'成因は未決着です。奥行き手がかりとして解釈されるという説（内向き＝手前の角、外向き＝奥の角）、輪郭全体の重心が取り込まれるという説などが並立します。矢羽の角度を0°に近づけると効果が消えることは安定して再現します。',
 n3:'線の「実長」ではなく「終端処理」が長さの印象を決めます。区切り線のキャップ形状、アイコンの矢印処理、プログレスバーの端の丸み——同じ数値でも進捗の見え方が変わる。数値の正確さが重要な表示ほど、端部の装飾は抑えるべきです。',
 tags:['長さの誤認','終端処理','プログレス表現']},

/* ---------- 3 ---------- */
{id:'verthoriz',cat:'size',name:'垂直水平錯視',en:'Vertical–horizontal',ratio:0.85,bg:'#e9e9ec',
 lead:'逆T字。垂直線と水平線、同じ長さに見えますか。',
 params:[{k:'len',label:'線の長さ',min:.35,max:.75,step:.01,def:.6,fmt:function(v){return v.toFixed(2);}},
  {k:'sep',label:'分割の強さ',min:0,max:1,step:.01,def:1,fmt:function(v){return v.toFixed(2);},hint:'0でL字（分割なし）になり、効果が弱まります'}],

     if(S.reveal)dln(g,m,y,w-m,y,ACC,2);}

   for(var k=0;k<P.rings;k++){var R=R0+k*step,segs=Math.max(14,Math.round(TAU*R/(step*1.15)));

   g.save();g.globalCompositeOperation='multiply';poly(g,sp,gs(255*P.sh));g.restore();
   var cyl=[[bx+c*6.1,by+c*1.2],[bx+c*7.1,by+c*1.2],[bx+c*7.1,by-c*2.4],[bx+c*6.1,by-c*2.4]];

 n1:'Bのほうが明らかに明るく見えますが、影の濃さ0.58では両者の画面上の値は同じ110です。答え合わせで同じ色のバーがA・Bを連結します。',

   for(var k=0;k<n;k++){var r0=R0+k*rw,r1=r0+rw*.94,segs=P.seg|0,rev=(k%2===1);

 ebbinghaus:{name:'Ebbinghaus Illusion',
  lead:'The orange circle A and circle B in the centre — which looks bigger? Set "Illusion strength" to 0 and the surrounds become equal, revealing the answer.',

  n1:'The larger the surround, the smaller the centre looks; the smaller the surround, the larger it looks. Most people are off by 5–20%.',

 verthoriz:{name:'Vertical–horizontal illusion',

 poggendorff:{name:'Poggendorff (1860)',

 zollner:{name:'Zöllner (1860)',

  n1:'The lines seem to tilt alternately, fanning open and closed. Setting the hatch angle to 0° or 90° restores parallelism.',

 cafewall:{name:'Café wall (Gregory 1979)',

  params:{shift:{label:'Row offset',hint:'0 or 0.5 removes it; around 0.25 is strongest'},mg:{label:'Mortar lightness',hint:'Mid-grey (~128) between black and white makes it strongest'},mw:{label:'Mortar width',hint:'0 removes the illusion'},n:{label:'Tiles',hint:''}},
  n1:'The tile rows seem to tilt alternately into wedges. It is strongest when the mortar is neither black nor white but mid-grey.',

  n3:'Pixel-art or tiled backgrounds with checker + thin mid-grey seams make the whole screen look warped. Push the seam colour toward one of the tile colours (contrast on one side only) and the warp vanishes — directly useful for texture grid design.',

 fraser:{name:'Fraser spiral (1908)',

  n2:'Local tilt information from each segment accumulates and systematically biases the estimate of the overall contour (an orientation-integration error). The checker background sharpens the local contrast imbalance.',
  n3:'Arrange fine diagonal elements around a circle in a logo or icon and the circle stops looking round. A spinning loading ring, a circular gauge’s ticks, text set on a circle — accumulated local slant destroys the roundness. Align circular-UI ticks along the radial (normal) direction to stay safe.',
  tags:['circular UI','gauges','logos']},
 adelson:{name:'Checker-shadow (Adelson 1995)',
  lead:'Square A and square B are exactly the same on-screen luminance when shadow strength is 0.58. If you don’t believe it, show the proof.',
  hook:{see:'square B looks lighter than square A',fact:'squares A and B are the same colour (same luminance)'},
  params:{sh:{label:'Shadow strength',hint:'0.58 gives A=B (exact match). 1.0 removes the shadow'}},
  n1:'B clearly looks lighter, yet at shadow 0.58 both have the same on-screen value of 110. The proof connects A and B with a bar of that same colour.',

  tags:['lightness constancy','colour tokens','background dependence']},
 simcontrast:{name:'Simultaneous contrast',
  lead:'The left and right grey squares are always exactly the same value. Only the backgrounds differ.',

  n1:'On a dark background the grey looks lighter; on a light background, darker. The proof connects both with a bar of the same value.',
  n2:'Lateral inhibition from retina to cortex exaggerates the luminance difference with neighbours — a side effect of encoding difference-from-surround rather than absolute brightness.',
  n3:'The same grey feels very different in dark mode vs light mode. Even when you meet a numeric contrast ratio, text can read "too faint" or "too harsh". In token design, define the foreground per background.',

 white:{name:"White's illusion (1979)",
  lead:'The two grey bars are the same value — yet the effect runs opposite to plain contrast.',

  params:{n:{label:'Stripes',hint:''},fig:{label:'Grey lightness',hint:''}},
  n1:'A, embedded in the black stripes, looks lighter. Plain contrast would predict "A is surrounded by black, so lighter" — but A actually touches black the most, opposite to that prediction.',

 mach:{name:'Mach bands / Chevreul',
  lead:'Each step is a perfectly uniform fill. Yet the edges of each step look lighter/darker.',

  params:{n:{label:'Steps',hint:''},ramp:{label:'Edge softness',hint:'Raise it for a gradient, and thin light/dark bands (Mach bands) appear at the kinks'}},
  n1:'Non-existent bright/dark lines appear at each step edge. Soften the boundary and thin bands (Mach bands) show up at the inflection points.',
  n2:'Contour enhancement from centre–surround receptive fields. Amplifying edge contrast invents relief that isn’t on a flat surface. Reported by E. Mach in 1865.',
  n3:'Gradient banding looks ugly partly from perceptual edge enhancement, not only dithering. But you can weaponise it — a 1px light/dark difference at a button or card edge gives depth and separation without a shadow. The core of hierarchy in flat design.',

 kanizsa:{name:'Kanizsa triangle (1955)',

  n1:'The triangle’s edges look sharp and its interior feels brighter than the surround. Rotate the inducers and — same positions — the outline disappears.',
  n2:'Illusory (subjective) contours. Vision adopts the occlusion reading "three circles are hidden behind a triangle" and fills in the missing boundary. A classic case of Gestalt closure; V2 neurons responding to illusory contours have been found.',
  n3:'You can define a region without drawing a border — L-shaped corner marks, notches, the shape of the whitespace. Grouping and focus can be built without a single line. Powerful in dense game UI where you want structure without adding ink.',

 grid:{name:'Hermann grid / scintillating grid',

  n1:'Grey smudges appear at intersections in the Hermann grid; black dots flicker at the white spots in the scintillating grid. Both vanish at the intersection you fixate.',
  n2:'Classically explained by retinal ganglion lateral inhibition, but that fails for wavy grids, so a cortical orientation-selective mechanism (S1 simple cells) is now favoured. A shared feature is that it only occurs in peripheral vision.',
  n3:'Even-spaced grids with high-contrast intersections generate visual noise. Dotted-divider tables, grid inventory frames, map grid lines — thin the lines, lower contrast, or thin out the intersections. It bites harder the longer the UI is viewed.',

 snakes:{name:'Peripheral drift (Kitaoka 2003)',

  n1:'The donut bands seem to rotate, each ring the opposite way. Fixate one point and it stops; a blink or gaze shift starts it again.',
  n2:'The asymmetric luminance order black→dark→white→light is the key. Higher-luminance parts drive faster visual responses, lower parts lag; on gaze shifts or blinks the timing difference between neighbours is misread as a motion signal. Kitaoka’s "Rotating Snakes" (2003).',
  n3:'Motion without motion = a dynamic effect at zero GPU cost. The luminance-ordered asymmetry can be baked into background textures or frames. It cuts both ways — unintended luminance ramps make a static UI background feel restless. A pattern to avoid behind long-lived HUDs.',
  tags:['static yet moving','zero-cost FX','HUD background pitfall']},
 mae:{name:'Motion aftereffect (waterfall, Addams 1834)',
  lead:'Fixate the centre dot for 25s. The moment it stops, the still spiral appears to spin the other way.',
  hook:{see:'stop it and the spiral seems to reverse',fact:'the stopped image is a complete still (motion aftereffect)'},
  params:{turns:{label:'Turns',hint:''},spd:{label:'Speed',hint:''},dir:{label:'Direction',hint:''}},

  n1:'When rotation stops, the still spiral seems to spin backward (or expand/contract). It lasts seconds to tens of seconds.',
  n2:'Direction-selective motion detectors adapt (fatigue), so for a static stimulus the opposite-direction detectors become relatively dominant. R. Addams’ 1834 "waterfall illusion" from the Falls of Foyers.',
  n3:'Adaptation happens across vision. Fire strong FX back-to-back and the threshold rises, so the same FX loses its punch — the same territory as gacha-FX inflation and always-glowing UI "disappearing" within minutes. For retention, inserting rests to reset adaptation beats ever-escalating intensity.',
  tags:['adaptation','FX inflation','designing rests']},
 afterimage:{name:'Negative afterimage',
  lead:'Fixate the black centre dot for 15s. When it switches, the complementary image floats up.',
  hook:{see:'switch it and a complementary-colour image floats up',fact:'no colour is painted on the white field (negative afterimage)'},
  params:{hue:{label:'Hue',hint:''},sat:{label:'Vividness',hint:''}},
  sess:{label:'Stare 15s',after:'What floats on the white field is the negative afterimage. Restart once it fades.'},
  n1:'The complementary colours (green→magenta, blue→yellow, etc.) form the same shape on the white field. Move your eyes and the image moves with them.',
  n2:'Adaptation of cones and the opponent-colour pathway. Sustained stimulation lowers responses, so against white light the opponent channel’s output becomes relatively dominant. The image following eye movements shows it is retinal.',
  n3:'Colours in long-lived UI "burn in" to your vision. After a full-screen saturated colour, the next white screen looks muddied. Account for the previous screen’s mean hue in transition design for a clean read — a factor in why a result screen after a long battle looks oddly dirty.',

 troxler:{name:'Troxler fading (1804)',
  lead:'Fixate only the centre dot and don’t move your eyes. In ~20s the faint surrounding colours vanish.',
  hook:{see:'stare and the surrounding colours fade away',fact:'the colours haven’t gone — they fade due to neural adaptation'},

  sess:{label:'Stare 20s',after:'Did they fade? A small eye movement or blink brings them right back.'},
  n1:'Blurred peripheral colours dissolve into the grey ground over tens of seconds. A blink or micro eye movement instantly restores them.',
  n2:'Neural adaptation. With a perfectly stabilised retinal image the response decays, and weak-contour stimuli are dropped as "not there" first. Normally microsaccades keep the image slightly moving to prevent this fading.',
  n3:'Information that never changes literally becomes invisible. Persistent banners, static tutorial arrows, fixed badges — weak-contour, low-contrast ones drop from awareness fastest. Important persistent elements need either subtle motion or clear contours. The perceptual basis of banner blindness.',
  tags:['adaptation','microsaccades','persistent elements']}

 poggendorff:{see:'右の線は左とズレているように見える',fact:'2本は一直線につながっている'},
 zollner:{see:'横線が交互に傾いて見える',fact:'すべての横線は完全に平行'},
 hering:{see:'2本の赤い線が外へ膨らんで見える',fact:'赤い線はまっすぐで、完全に平行'},
 cafewall:{see:'タイルの段が斜めに傾いて見える',fact:'すべての段は完全に平行'},
 fraser:{see:'外へ広がる渦巻きに見える',fact:'渦ではなく、ただの同心円'},
 adelson:{see:'マスBのほうが明るく見える',fact:'マスAとマスBは同じ色（同じ輝度）'},
 simcontrast:{see:'左の四角のほうが明るく見える',fact:'左右の四角はまったく同じ色'},
 white:{see:'Aのほうが明るく見える',fact:'AとBはまったく同じ色'},
 mach:{see:'各段の境目に明暗の線が見える',fact:'各段は均一な塗り。境目の線は存在しない'},
 kanizsa:{see:'白い三角形がはっきり見える',fact:'三角形の輪郭線は1本も描かれていない'},
 grid:{see:'交差点にチラチラ点が現れる',fact:'交差点には点も影も描かれていない'},
 snakes:{see:'輪がゆっくり回転して見える',fact:'1ピクセルも動いていない完全な静止画'},
 mae:{see:'止めると渦が逆回転して見える',fact:'止まった画像は完全な静止画（運動残効）'},
 afterimage:{see:'切り替えると補色の像が浮かぶ',fact:'白い面に色は塗られていない（補色残像）'},
 troxler:{see:'見つめると周囲の色が消える',fact:'色は消えていない（神経順応で消えて感じる）'}
};
function cur(){for(var i=0;i<ILLUSIONS.length;i++)if(ILLUSIONS[i].id===curId)return ILLUSIONS[i];return ILLUSIONS[0];}

/* ===== audio ===== */
var AC=null,sndOn=true;
function beep(f,d,ty){if(!sndOn)return;try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  var o=AC.createOscillator(),gg=AC.createGain();o.type=ty||'sine';o.frequency.value=f;
  gg.gain.setValueAtTime(.0001,AC.currentTime);gg.gain.exponentialRampToValueAtTime(.09,AC.currentTime+.01);
  gg.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+(d||.12));
  o.connect(gg);gg.connect(AC.destination);o.start();o.stop(AC.currentTime+(d||.12)+.02);}catch(e){}}

function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show');},1800);}

/* ===== canvas ===== */
var cv=$('#cv'),g=cv.getContext('2d'),CW=0,CH=0;
function sizeCanvas(){
  var st=$('#stage'),il=cur(),zoom=st.classList.contains('zoom');
  var w=st.clientWidth-(zoom?28:24),hh=w*il.ratio;
  if(zoom){var mh=st.clientHeight-28;if(hh>mh){hh=mh;w=hh/il.ratio;}}
  var dpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=Math.max(1,Math.round(w*dpr));cv.height=Math.max(1,Math.round(hh*dpr));
  cv.style.width=w+'px';cv.style.height=hh+'px';
  g.setTransform(dpr,0,0,dpr,0,0);CW=w;CH=hh;dirty=true;}

function draw(){var il=cur(),P=V[il.id];
  g.save();g.clearRect(0,0,CW,CH);
  g.fillStyle=(ST.stage==='after'&&il.bg2)?il.bg2:il.bg;g.fillRect(0,0,CW,CH);
  try{il.draw(g,CW,CH,P,ST);}catch(e){}
  g.restore();}

var lastT=0,lastSec=-1;
function loop(ts){
  var dt=lastT?Math.min(.05,(ts-lastT)/1000):0;lastT=ts;
  var il=cur();
  if(ST.stage==='run'){ST.left-=dt;
    if(ST.left<=0){ST.left=0;ST.stage='after';beep(660,.25,'triangle');dirty=true;updTimer();}
    else{var s=Math.ceil(ST.left);if(s!==lastSec){lastSec=s;updTimer();}}}
  if(il.tick)il.tick(V[il.id],ST,dt);
  if(il.anim||dirty){draw();dirty=false;}
  requestAnimationFrame(loop);}

/* ===== nav ===== */
function buildCats(){var el=$('#cats');el.innerHTML='';
  CATS.forEach(function(c){var b=document.createElement('button');b.className='cat'+(c[0]===curCat?' active':'');
    b.textContent=lang==='en'?c[2]:c[1];b.onclick=function(){curCat=c[0];beep(880,.05,'square');
      var f=ILLUSIONS.filter(function(x){return x.cat===curCat;});if(f.length)select(f[0].id);
      buildCats();buildChips();};el.appendChild(b);});}

function buildChips(){var el=$('#chips');el.innerHTML='';
  ILLUSIONS.filter(function(x){return x.cat===curCat;}).forEach(function(x){
    var b=document.createElement('button');
    b.className='chip'+(x.id===curId?' active':'')+(store.seen[x.id]?' done':'');
    b.textContent=nameOf(x);b.onclick=function(){select(x.id);buildChips();};el.appendChild(b);});}

function updProg(){var n=0;for(var k in store.seen)if(store.seen[k])n++;
  $('#prog').textContent=n;$('#total').textContent=ILLUSIONS.length;}

/* ===== caption / hook ===== */
function buildCaption(){
  var il=cur(),h=hookOf(il),box=$('#hook');
  if(il.session){
    var sl=sInfo(il).label;
    box.className='hook sess';
    box.innerHTML='<div class="h-fact">'+h.see+(lang==='en'?'? … ':'？ … ')+'<b>'+h.fact+'</b></div>'
      +'<div class="h-why">'+T('capWhyS').replace('$L',sl)+'</div>';
  }else{
    box.className='hook';
    box.innerHTML='<div class="h-row"><span class="h-tag">'+T('capSee')+'</span>'+h.see+'</div>'
      +'<div class="h-fact">'+T('capBut')+'<b>'+h.fact+'</b></div>'
      +'<div class="h-why">'+T('capWhy')+'</div>';
  }
}

/* ===== controls ===== */
function buildControls(){
  var il=cur(),c=$('#ctrl');c.innerHTML='';
  (il.params||[]).forEach(function(p){
    var pi=pInfo(il,p);
    var row=document.createElement('div');row.className='prow';
    var lab=document.createElement('div');lab.className='plab';lab.textContent=pi.label;row.appendChild(lab);
    if(p.type==='select'){
      var sel=document.createElement('select');
      p.opts.forEach(function(o){var op=document.createElement('option');op.value=o[0];op.textContent=o[1];sel.appendChild(op);});
      sel.value=V[il.id][p.k];
      sel.onchange=function(){V[il.id][p.k]=sel.value;dirty=true;};
      row.appendChild(sel);
    }else{
      var r=document.createElement('input');r.type='range';r.min=p.min;r.max=p.max;r.step=p.step;r.value=V[il.id][p.k];
      var val=document.createElement('div');val.className='pval';val.textContent=p.fmt(V[il.id][p.k]);
      r.oninput=function(){var v=parseFloat(r.value);V[il.id][p.k]=v;val.textContent=p.fmt(v);dirty=true;};
      row.appendChild(r);row.appendChild(val);}
    c.appendChild(row);
    if(pi.hint){var hn=document.createElement('div');hn.className='hint';hn.textContent=pi.hint;c.appendChild(hn);}
  });

  var bs=$('#btns');bs.innerHTML='';
  if(il.session){
    var sl=sInfo(il).label;
    var sb=document.createElement('button');sb.className='btn acc';
    sb.textContent=(ST.stage==='run')?(lang==='en'?'■ Stop':'■ 中止'):sl;
    sb.onclick=function(){
      if(ST.stage==='run'){ST.stage='idle';ST.left=0;}
      else{ST.stage='run';ST.left=il.session.sec;ST.phase=0;beep(520,.1,'triangle');}
      dirty=true;updTimer();buildControls();};
    bs.appendChild(sb);
  }else{
    var rb=document.createElement('button');rb.className='btn'+(ST.reveal?' on':'');
    rb.textContent=ST.reveal?T('proofOn'):T('proofOff');
    rb.onclick=function(){ST.reveal=!ST.reveal;dirty=true;beep(ST.reveal?740:440,.08,'square');
      toast(ST.reveal?T('toastOn'):T('toastOff'));buildControls();};
    bs.appendChild(rb);}
  var db=document.createElement('button');db.className='btn';db.textContent=T('reset');
  db.onclick=function(){(il.params||[]).forEach(function(p){V[il.id][p.k]=p.def;});
    if(il.task)V[il.id][il.task.k]=il.task.def;
    dirty=true;buildControls();buildTask();toast(T('toastReset'));};
  bs.appendChild(db);
  var zb=document.createElement('button');zb.className='btn';zb.textContent=T('zoom');
  zb.onclick=function(){$('#stage').classList.add('zoom');sizeCanvas();};
  bs.appendChild(zb);
  updTimer();
}

function updTimer(){
  var il=cur(),t=$('#timer');
  if(!il.session){t.style.display='none';return;}
  t.style.display='block';
  if(ST.stage==='run')t.textContent=T('tRun').replace('$S',Math.ceil(ST.left));
  else if(ST.stage==='after')t.textContent='◆ '+sInfo(il).after;
  else t.textContent=T('tIdle');}

/* ===== task ===== */
function buildTask(){
  var il=cur(),sec=$('#tasksec'),body=$('#taskbody');
  if(!il.task){sec.style.display='none';body.innerHTML='';return;}
  sec.style.display='block';var t=il.task,ti=tInfo(il);
  body.innerHTML='<p style="margin:0 0 10px;font-size:12px;line-height:1.7;color:var(--dim)">'+T('taskIntro')+'</p>';
  var row=document.createElement('div');row.className='prow';
  var lab=document.createElement('div');lab.className='plab';lab.textContent=ti.label;
  var r=document.createElement('input');r.type='range';r.min=t.min;r.max=t.max;r.step=t.step;r.value=V[il.id][t.k];
  var val=document.createElement('div');val.className='pval';
  var fmt=t.fmt||function(v){return v.toFixed(3);};
  val.textContent=fmt(V[il.id][t.k]);
  r.oninput=function(){var v=parseFloat(r.value);V[il.id][t.k]=v;val.textContent=fmt(v);dirty=true;};
  row.appendChild(lab);row.appendChild(r);row.appendChild(val);body.appendChild(row);
  var br=document.createElement('div');br.className='btnrow';
  var ob=document.createElement('button');ob.className='btn';ob.textContent=T('offset');
  ob.onclick=function(){var span=t.max-t.min,sgn=Math.random()<.5?-1:1,off=(0.25+Math.random()*0.35)*span*0.5*sgn;
    var nv=Math.max(t.min,Math.min(t.max,t.truth+off));V[il.id][t.k]=nv;ST.reveal=false;dirty=true;
    buildTask();buildControls();var rr=$('#res');if(rr)rr.style.display='none';};
  br.appendChild(ob);
  var jb=document.createElement('button');jb.className='btn acc';jb.textContent=T('judge');
  jb.onclick=judge;br.appendChild(jb);
  var rb=document.createElement('button');rb.className='btn';rb.textContent=T('backEq');
  rb.onclick=function(){V[il.id][t.k]=t.truth;ST.reveal=false;dirty=true;buildTask();buildControls();};
  br.appendChild(rb);body.appendChild(br);
  var res=document.createElement('div');res.className='result';res.id='res';res.style.display='none';body.appendChild(res);
  if(store.best[il.id]!=null){
    var b=document.createElement('p');b.style.cssText='margin:9px 0 0;font-size:10.5px;color:var(--muted)';
    b.textContent=T('best')+store.best[il.id].toFixed(1)+(ti.errUnit||'%');body.appendChild(b);}
}

function judge(){
  var il=cur(),t=il.task;if(!t)return;
  var ti=tInfo(il);
  var v=V[il.id][t.k];
  var e=t.errFn?t.errFn(v,V[il.id],CW,CH):(v/t.truth-1)*100;
  var a=Math.abs(e),unit=ti.errUnit||'%';
  var rate=a<1.5?T('rate0'):a<5?T('rate1'):a<12?T('rate2'):T('rate3');
  var dir=e>0?ti.over:ti.under;
  if(a<0.6)dir=T('near');
  var res=$('#res');
  res.style.display='block';
  res.innerHTML='<div class="big'+(a>=5?' bad':'')+'">'+(e>0?'+':'')+e.toFixed(1)+unit+'</div>'
    +'<p>'+dir+'</p><p>'+rate+'</p>'
    +'<div class="gauge"><b style="width:'+Math.min(100,a*5)+'%"></b></div>';
  ST.reveal=true;dirty=true;buildControls();
  beep(a<5?880:440,.18,'triangle');
  if(store.best[il.id]==null||a<store.best[il.id]){store.best[il.id]=a;save();}
}

/* ===== select ===== */
function select(id){
  curId=id;ST={reveal:false,phase:0,stage:'idle',left:0};lastSec=-1;
  var il=cur();
  $('#stage').style.background=il.bg;
  $('#ttl').textContent=nameOf(il);$('#en').textContent=il.en;$('#lead').textContent=TR(il,'lead');
  $('#n1').textContent=TR(il,'n1');$('#n2').textContent=TR(il,'n2');$('#n3').textContent=TR(il,'n3');
  var tg=$('#tags');tg.innerHTML='';
  (TR(il,'tags')||[]).forEach(function(t){var s=document.createElement('span');s.className='tag';s.textContent='# '+t;tg.appendChild(s);});
  buildCaption();buildControls();buildTask();sizeCanvas();
  if(!store.seen[id]){store.seen[id]=1;save();updProg();buildChips();}
}

/* ===== chrome / language ===== */
function applyChrome(){
  $('#lblExp').textContent=T('exp');
  $('#ttlCtrl').textContent=T('ctrl');
  $('#ttlTask').textContent=T('task');
  $('#ttlNote').textContent=T('note');
  $('#ttlPercept').textContent=T('percept');
  $('#ttlMech').textContent=T('mech');
  $('#ttlApply').textContent=T('apply');
  $('#foot').innerHTML=T('footer');
  $('#lang').textContent=(lang==='en')?'JP':'EN';
}
function setLang(l){lang=l;applyChrome();buildCats();buildChips();select(curId);}
$('#lang').onclick=function(){beep(700,.06,'square');setLang(lang==='en'?'ja':'en');};

/* ===== init ===== */
$('#snd').onclick=function(){sndOn=!sndOn;$('#snd').classList.toggle('on',sndOn===false?false:true);
  $('#snd').textContent=sndOn?'SOUND':'MUTED';if(sndOn)beep(660,.08,'square');};
$('#snd').classList.add('on');
$('#zoomclose').onclick=function(){$('#stage').classList.remove('zoom');sizeCanvas();};
window.addEventListener('resize',function(){sizeCanvas();});
window.addEventListener('orientationchange',function(){setTimeout(sizeCanvas,250);});

applyChrome();buildCats();buildChips();updProg();select(ILLUSIONS[0].id);
requestAnimationFrame(loop);
</script>
</body>
</html>
